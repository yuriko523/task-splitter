<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#fce4c8">
  <meta name="description" content="把大事拆成小事——拖延症任务拆分器">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" sizes="192x192" href="assets/icons/icon-192.svg">
  <link rel="icon" type="image/svg+xml" sizes="512x512" href="assets/icons/icon-512.svg">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.svg">
  <title>任务拆分器</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ═══ 主界面 ═══ -->
  <div class="app-container">

    <!-- 标题区 -->
    <header class="app-header">
      <h1 class="app-title">🧩 任务拆分器</h1>
      <p class="app-subtitle">把大事拆成小事</p>
    </header>

    <!-- 输入区 -->
    <main class="app-main">
      <div class="input-group">
        <label class="input-label" for="taskInput">你想做什么？</label>
        <textarea
          id="taskInput"
          class="input-field"
          rows="2"
          placeholder="去洗澡"
        ></textarea>
      </div>

      <div class="input-group">
        <label class="input-label" for="stateInput">你现在是什么状态？</label>
        <textarea
          id="stateInput"
          class="input-field"
          rows="2"
          placeholder="在床上瘫着"
        ></textarea>
      </div>

      <button id="splitBtn" class="split-btn">
        <span class="split-btn-icon">🔨</span>
        <span>拆分</span>
      </button>

      <!-- 空状态引导 -->
      <div class="empty-state" id="emptyState">
        <div class="empty-emoji">🤔</div>
        <p class="empty-hint">试试输入「去洗澡」+「在床上瘫着」</p>
        <p class="empty-hint-sub">或者「写作业」+「刚打开书本」</p>
      </div>

      <!-- 分隔线 + 结果区 -->
      <div class="result-section" id="resultSection" hidden>
        <div class="divider"></div>

        <!-- 加载态 -->
        <div class="loading" id="loadingIndicator" hidden>
          <div class="loading-bar"></div>
          <p class="loading-text">正在帮你拆解……</p>
        </div>

        <!-- 错误提示 -->
        <div class="error-msg" id="errorMsg" hidden>
          <span class="error-icon">😅</span>
          <span id="errorText"></span>
        </div>

        <!-- 步骤列表 -->
        <div class="steps-header">
          <span class="steps-title">拆解步骤</span>
          <button class="steps-reset-btn" id="resetStepsBtn" title="重置打勾">↺</button>
        </div>
        <ol class="steps-list" id="stepsList"></ol>
      </div>
    </main>

    <!-- 底部设置入口 -->
    <footer class="app-footer">
      <button id="settingsBtn" class="footer-btn" title="设置">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
      </button>
    </footer>
  </div>

  <!-- ═══ 设置弹窗 ═══ -->
  <div class="modal-overlay" id="settingsModal" hidden>
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">⚙️ 设置</h2>
        <button class="modal-close" id="modalCloseBtn">&times;</button>
      </div>
      <div class="modal-body">
        <div class="input-group">
          <label class="input-label" for="workerUrlInput">Worker 地址</label>
          <input
            type="url"
            id="workerUrlInput"
            class="input-field"
            placeholder="https://task-splitter-proxy.xxxx.workers.dev"
          />
        </div>
        <div class="input-group">
          <label class="input-label" for="apiKeyInput">API Key</label>
          <input
            type="password"
            id="apiKeyInput"
            class="input-field"
            placeholder="sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
          />
        </div>
        <button id="testBtn" class="test-btn">
          <span>🔗</span> 测试连接
        </button>
        <div class="test-result" id="testResult" hidden></div>
      </div>
      <div class="modal-footer">
        <button id="saveSettingsBtn" class="save-btn">💾 保存设置</button>
      </div>
    </div>
  </div>

  <script src="js/settings.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    // 注册 Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
